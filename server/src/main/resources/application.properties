spring.application.name=order-management

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/order_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

server.port=${PORT:8081}

jwt.secret=${JWT_SECRET:my-super-secret-key-for-order-management-app-2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

seed.admin.email=${SEED_ADMIN_EMAIL:admin@example.com}
seed.admin.password=${SEED_ADMIN_PASSWORD:admin123}

seed.customer.email=${SEED_CUSTOMER_EMAIL:customer@example.com}
seed.customer.password=${SEED_CUSTOMER_PASSWORD:customer123}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}